<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<style>
:root {
  --title-size: 72px;
  --subtitle-size: 30px;
  --footer-size: 22px;
  --title-top: 840px;
  --subtitle-top: 1110px;
  --footer-bottom: 60px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1350px; overflow: hidden; }
.canvas {
  display: flex; flex-direction: column;
  position: relative; width: 1080px; height: 1350px;
  background: #000;
  font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  color: #fff;
}
.hero-img {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover; filter: brightness(0.55); display: block;
}
/* Taller scrim for v2 — stronger readability for lower-positioned text */
.scrim {
  position: absolute; left: 0; right: 0; bottom: 0;
  height: 360px;
  background: linear-gradient(to top, rgba(0,0,0,0.72), transparent);
  pointer-events: none;
}
/* Left-aligned title in lower area */
.slot-title {
  position: absolute; left: 75px; top: var(--title-top);
  width: 750px; height: 260px;
  font-size: var(--title-size); font-weight: 700;
  line-height: 1.22; text-align: left;
  text-shadow: 0 2px 16px rgba(0,0,0,0.7); overflow: hidden;
}
/* Subtitle below title, left-aligned */
.slot-subtitle {
  position: absolute; left: 75px; top: var(--subtitle-top);
  width: 750px; height: 60px;
  font-size: var(--subtitle-size); font-weight: 500;
  line-height: 1.35; color: rgba(255,255,255,0.75);
  text-shadow: 0 1px 8px rgba(0,0,0,0.5); overflow: hidden;
}
.slot-footer {
  position: absolute; left: 75px; bottom: var(--footer-bottom);
  width: 930px; height: 40px;
  font-size: var(--footer-size); color: rgba(255,255,255,0.7);
  line-height: 40px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}

</style>
</head>
<body>
<div id="canvas" class="canvas" data-safe-top="75" data-safe-bottom="100" data-safe-left="75" data-safe-right="75" data-footer-zone-h="360">
  <img class="hero-img" src="file:///C:/Users/pjhic/Projects/Web_magazine/test_image/images.jpeg" alt="디에디트가 알려주는 2026 봄 인테리어 트렌드" />
  <div class="scrim"></div>
  <div id="box-title" class="slot-title" data-bbox-w="750" data-bbox-h="260">디에디트가 알려주는 2026 봄 인테리어 트렌드</div>
  <div id="box-subtitle" class="slot-subtitle" data-bbox-w="750" data-bbox-h="60">올 봄, 집을 바꾸는 5가지 키워드</div>
  <div id="box-footer" class="slot-footer">Photo by Test on Unsplash</div>
</div>
</body>
</html>
