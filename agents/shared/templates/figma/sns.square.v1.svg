<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A1A2E"/>
      <stop offset="1" stop-color="#16213E"/>
    </linearGradient>
    <clipPath id="hero-clip">
      <rect x="0" y="0" width="1080" height="1080" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg-grad)"/>

  <!-- Hero image (full background, clipped) -->
  <image id="{{hero-image}}" href="" x="0" y="0" width="1080" height="1080" preserveAspectRatio="xMidYMid slice" clip-path="url(#hero-clip)" opacity="0.3"/>

  <!-- Top: accent bar + category -->
  <rect id="{{accent-color}}" x="60" y="60" width="4" height="20" rx="2" fill="#E17055"/>

  <!-- Footer as category label -->
  <text id="{{footer}}" x="76" y="76" font-family="Pretendard, sans-serif" font-size="14" font-weight="700" fill="#E17055" letter-spacing="2" data-max-width="960" data-max-lines="1">
    WEB MAGAZINE
  </text>

  <!-- Title (centered vertically) -->
  <text id="{{title}}" x="60" y="480" font-family="Pretendard, sans-serif" font-size="48" font-weight="800" fill="#FFFFFF" data-max-width="960" data-max-lines="3" data-line-height="1.25">
    제목을 입력하세요
  </text>

  <!-- Body -->
  <text id="{{body}}" x="60" y="660" font-family="Pretendard, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.65)" data-max-width="960" data-max-lines="3" data-line-height="1.5">
    본문 내용
  </text>

  <!-- Watermark -->
  <text x="60" y="1040" font-family="Pretendard, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.5)">
    Web Magazine
  </text>
</svg>
