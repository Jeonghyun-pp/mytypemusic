<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg-grad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#0f0c29"/>
      <stop offset="0.5" stop-color="#302b63"/>
      <stop offset="1" stop-color="#24243e"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="0.5" cy="0.45" r="0.4">
      <stop offset="0" stop-color="#6C5CE7" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#6C5CE7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg-grad)"/>
  <rect width="1080" height="1350" fill="url(#center-glow)"/>

  <!-- Accent bar -->
  <rect id="{{accent-color}}" x="510" y="540" width="60" height="4" rx="2" fill="#6C5CE7"/>

  <!-- Title (CTA text, centered) -->
  <text id="{{title}}" x="540" y="640" font-family="Pretendard, sans-serif" font-size="52" font-weight="700" fill="#FFFFFF" text-anchor="middle" data-max-width="720" data-max-lines="3" data-line-height="1.4">
    마무리 텍스트
  </text>

  <!-- Body (optional subtitle) -->
  <text id="{{body}}" x="540" y="780" font-family="Pretendard, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.6)" text-anchor="middle" data-max-width="720" data-max-lines="2" data-line-height="1.5">
    부가 설명
  </text>

  <!-- Footer -->
  <text id="{{footer}}" x="540" y="1300" font-family="Pretendard, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.7)" text-anchor="middle" data-max-width="920" data-max-lines="1">
    Web Magazine
  </text>
</svg>
