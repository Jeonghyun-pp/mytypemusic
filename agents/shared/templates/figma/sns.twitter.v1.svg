<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2D3436"/>
      <stop offset="1" stop-color="#636E72"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg-grad)"/>

  <!-- Hero image (right side, faded) -->
  <image id="{{hero-image}}" href="" x="600" y="0" width="600" height="675" preserveAspectRatio="xMidYMid slice" opacity="0.2"/>

  <!-- Accent bar + category -->
  <rect id="{{accent-color}}" x="48" y="250" width="4" height="16" rx="2" fill="#E17055"/>

  <!-- Footer as category label -->
  <text id="{{footer}}" x="64" y="262" font-family="Pretendard, sans-serif" font-size="14" font-weight="700" fill="#E17055" letter-spacing="2" data-max-width="800" data-max-lines="1">
    WEB MAGAZINE
  </text>

  <!-- Title (left, vertically centered) -->
  <text id="{{title}}" x="48" y="330" font-family="Pretendard, sans-serif" font-size="40" font-weight="800" fill="#FFFFFF" data-max-width="700" data-max-lines="2" data-line-height="1.3">
    제목을 입력하세요
  </text>

  <!-- Body -->
  <text id="{{body}}" x="48" y="440" font-family="Pretendard, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.6)" data-max-width="600" data-max-lines="2" data-line-height="1.5">
    본문 내용
  </text>

  <!-- Watermark (bottom-right) -->
  <text x="1152" y="645" font-family="Pretendard, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.35)" text-anchor="end">
    Web Magazine
  </text>
</svg>
