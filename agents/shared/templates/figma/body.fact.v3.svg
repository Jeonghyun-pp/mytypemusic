<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg-grad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#1a0a2e"/>
      <stop offset="0.4" stop-color="#2d1b4e"/>
      <stop offset="1" stop-color="#4a2068"/>
    </linearGradient>
    <clipPath id="card-clip">
      <rect x="70" y="280" width="940" height="680" rx="24"/>
    </clipPath>
    <filter id="frost" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Gradient background -->
  <rect width="1080" height="1350" fill="url(#bg-grad)"/>

  <!-- Headline (small, uppercase) -->
  <text id="{{title}}" x="80" y="240" font-family="Pretendard, sans-serif" font-size="24" font-weight="500" fill="rgba(255,255,255,0.45)" letter-spacing="2" data-max-width="920" data-max-lines="1" data-line-height="1.3">
    HEADLINE
  </text>

  <!-- Frosted glass card background -->
  <rect x="70" y="280" width="940" height="680" rx="24" fill="rgba(255,255,255,0.04)" filter="url(#frost)"/>
  <rect x="70" y="280" width="940" height="680" rx="24" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Body text inside card -->
  <text id="{{body}}" x="120" y="520" font-family="Pretendard, sans-serif" font-size="42" font-weight="600" fill="#FFFFFF" data-max-width="840" data-max-lines="6" data-line-height="1.4" clip-path="url(#card-clip)">
    본문 내용이 여기에 들어갑니다
  </text>

  <!-- Accent dot on card -->
  <circle id="{{accent-color}}" cx="120" cy="330" r="5" fill="#6C5CE7"/>

  <!-- Footer -->
  <text id="{{footer}}" x="80" y="1300" font-family="Pretendard, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.7)" data-max-width="920" data-max-lines="1">
    Web Magazine
  </text>
</svg>
