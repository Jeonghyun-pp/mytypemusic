<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6C5CE7"/>
      <stop offset="1" stop-color="#A29BFE"/>
    </linearGradient>
    <radialGradient id="num-glow" cx="0.85" cy="0.15" r="0.4">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg-grad)"/>
  <rect width="1080" height="1350" fill="url(#num-glow)"/>

  <!-- Ghost ranking number (top-right) -->
  <text x="940" y="240" font-family="Pretendard, sans-serif" font-size="120" font-weight="900" fill="rgba(255,255,255,0.15)" text-anchor="end">
    01
  </text>

  <!-- Title (item name, centered vertically) -->
  <text id="{{title}}" x="80" y="650" font-family="Pretendard, sans-serif" font-size="36" font-weight="600" fill="#FFFFFF" data-max-width="920" data-max-lines="2" data-line-height="1.3">
    랭킹 항목명
  </text>

  <!-- Accent bar -->
  <rect id="{{accent-color}}" x="80" y="690" width="60" height="3" rx="1.5" fill="#FFFFFF"/>

  <!-- Body (description) -->
  <text id="{{body}}" x="80" y="740" font-family="Pretendard, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.7)" data-max-width="920" data-max-lines="5" data-line-height="1.5">
    설명 텍스트가 여기에 들어갑니다
  </text>

  <!-- Footer -->
  <text id="{{footer}}" x="80" y="1300" font-family="Pretendard, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.6)" data-max-width="920" data-max-lines="1">
    Web Magazine
  </text>
</svg>
