<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- Background -->
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(160)">
      <stop offset="0" stop-color="#1a0a2e"/>
      <stop offset="0.4" stop-color="#2d1b4e"/>
      <stop offset="1" stop-color="#4a2068"/>
    </linearGradient>
    <linearGradient id="scrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0a2e" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#1a0a2e" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#1a0a2e" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg-grad)"/>

  <!-- Hero image -->
  <image id="{{hero-image}}" href="" x="0" y="0" width="1080" height="1080" preserveAspectRatio="xMidYMid slice"/>

  <!-- Scrim overlay (360px from bottom) -->
  <rect x="0" y="630" width="1080" height="720" fill="url(#scrim)"/>

  <!-- Accent bar -->
  <rect id="{{accent-color}}" x="80" y="960" width="60" height="6" rx="3" fill="#6C5CE7"/>

  <!-- Title — left-aligned, bottom area -->
  <text id="{{title}}" x="80" y="1040" font-family="Pretendard, sans-serif" font-size="56" font-weight="800" fill="#FFFFFF" data-max-width="920" data-max-lines="2" data-line-height="1.3">
    제목을 입력하세요
  </text>

  <!-- Body -->
  <text id="{{body}}" x="80" y="1160" font-family="Pretendard, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.75)" data-max-width="760" data-max-lines="3" data-line-height="1.5">
    본문 내용이 여기에 들어갑니다
  </text>

  <!-- Footer -->
  <text id="{{footer}}" x="80" y="1300" font-family="Pretendard, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.7)" data-max-width="920" data-max-lines="1">
    Web Magazine
  </text>
</svg>
