<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg-grad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#1A1A2E"/>
      <stop offset="1" stop-color="#16213E"/>
    </linearGradient>
    <filter id="quote-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#E17055" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg-grad)"/>

  <!-- Decorative quotation mark -->
  <text x="540" y="460" font-family="Pretendard, sans-serif" font-size="120" font-weight="800" fill="rgba(225,112,85,0.3)" text-anchor="middle" filter="url(#quote-shadow)">
    "
  </text>

  <!-- Body (quote text, centered) -->
  <text id="{{body}}" x="540" y="570" font-family="Pretendard, sans-serif" font-size="36" font-weight="600" fill="#FFFFFF" text-anchor="middle" data-max-width="920" data-max-lines="5" data-line-height="1.5">
    인용문이 여기에 들어갑니다
  </text>

  <!-- Title (attribution, centered) -->
  <text id="{{title}}" x="540" y="920" font-family="Pretendard, sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.5)" text-anchor="middle" data-max-width="920" data-max-lines="1" data-line-height="1.3">
    — 출처
  </text>

  <!-- Accent divider -->
  <rect id="{{accent-color}}" x="510" y="870" width="60" height="2" rx="1" fill="#E17055"/>

  <!-- Footer -->
  <text id="{{footer}}" x="540" y="1300" font-family="Pretendard, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.5)" text-anchor="middle" data-max-width="920" data-max-lines="1">
    Web Magazine
  </text>
</svg>
