<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg-grad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#0b2027"/>
      <stop offset="0.4" stop-color="#0a3d42"/>
      <stop offset="1" stop-color="#1b6b5a"/>
    </linearGradient>
  </defs>

  <!-- Gradient background -->
  <rect width="1080" height="1350" fill="url(#bg-grad)"/>

  <!-- Headline (small, muted) -->
  <text id="{{title}}" x="80" y="180" font-family="Pretendard, sans-serif" font-size="32" font-weight="600" fill="rgba(255,255,255,0.55)" data-max-width="920" data-max-lines="1" data-line-height="1.3">
    헤드라인
  </text>

  <!-- Divider line -->
  <rect id="{{accent-color}}" x="80" y="220" width="920" height="2" fill="rgba(255,255,255,0.3)"/>

  <!-- Body text (large, bold) -->
  <text id="{{body}}" x="80" y="340" font-family="Pretendard, sans-serif" font-size="44" font-weight="700" fill="#FFFFFF" data-max-width="920" data-max-lines="8" data-line-height="1.4">
    본문 내용이 여기에 들어갑니다
  </text>

  <!-- Footer -->
  <text id="{{footer}}" x="80" y="1300" font-family="Pretendard, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.7)" data-max-width="920" data-max-lines="1">
    Web Magazine
  </text>
</svg>
