<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg-grad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#0f0c29"/>
      <stop offset="0.5" stop-color="#302b63"/>
      <stop offset="1" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6C5CE7"/>
      <stop offset="1" stop-color="#A29BFE"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg-grad)"/>

  <!-- Title -->
  <text id="{{title}}" x="80" y="150" font-family="Pretendard, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" data-max-width="920" data-max-lines="1" data-line-height="1.3">
    리스트 제목
  </text>

  <!-- Accent bar under title -->
  <rect id="{{accent-color}}" x="80" y="175" width="920" height="2" fill="url(#accent-grad)"/>

  <!-- Body (list items as multi-line text) -->
  <text id="{{body}}" x="80" y="260" font-family="Pretendard, sans-serif" font-size="22" font-weight="400" fill="#FFFFFF" data-max-width="920" data-max-lines="15" data-line-height="2.0">
    리스트 항목이 여기에 들어갑니다
  </text>

  <!-- Footer -->
  <text id="{{footer}}" x="80" y="1300" font-family="Pretendard, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.5)" data-max-width="920" data-max-lines="1">
    Web Magazine
  </text>
</svg>
