<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6C5CE7"/>
      <stop offset="1" stop-color="#A29BFE"/>
    </linearGradient>
    <filter id="badge-shadow" x="-20%" y="-30%" width="140%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Hero image (faded background) -->
  <image id="{{hero-image}}" href="" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice" opacity="0.15"/>

  <!-- Category badge -->
  <rect x="48" y="48" width="auto" height="36" rx="8" fill="rgba(0,0,0,0.3)" filter="url(#badge-shadow)"/>
  <rect id="{{accent-color}}" x="48" y="48" width="160" height="36" rx="8" fill="rgba(0,0,0,0.3)"/>

  <!-- Footer as badge text -->
  <text id="{{footer}}" x="128" y="72" font-family="Pretendard, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" data-max-width="140" data-max-lines="1">
    WEB MAGAZINE
  </text>

  <!-- Title (large, impact) -->
  <text id="{{title}}" x="48" y="380" font-family="Pretendard, sans-serif" font-size="52" font-weight="900" fill="#FFFFFF" data-max-width="960" data-max-lines="2" data-line-height="1.2">
    제목을 입력하세요
  </text>

  <!-- Body (bottom) -->
  <text id="{{body}}" x="48" y="660" font-family="Pretendard, sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.7)" data-max-width="960" data-max-lines="1" data-line-height="1.5">
    본문 내용
  </text>
</svg>
