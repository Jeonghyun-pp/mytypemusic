<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6C5CE7"/>
      <stop offset="1" stop-color="#A29BFE"/>
    </linearGradient>
    <filter id="btn-shadow" x="-10%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg-grad)"/>

  <!-- Title (centered) -->
  <text id="{{title}}" x="540" y="520" font-family="Pretendard, sans-serif" font-size="44" font-weight="800" fill="#FFFFFF" text-anchor="middle" data-max-width="920" data-max-lines="2" data-line-height="1.3">
    CTA 제목
  </text>

  <!-- Body (description) -->
  <text id="{{body}}" x="540" y="610" font-family="Pretendard, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.7)" text-anchor="middle" data-max-width="920" data-max-lines="2" data-line-height="1.5">
    설명 텍스트
  </text>

  <!-- CTA Button (pill shape with shadow) -->
  <rect x="380" y="680" width="320" height="56" rx="28" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="2" filter="url(#btn-shadow)"/>
  <text x="540" y="715" font-family="Pretendard, sans-serif" font-size="20" font-weight="600" fill="#FFFFFF" text-anchor="middle">
    더 알아보기 →
  </text>

  <!-- Accent dot -->
  <circle id="{{accent-color}}" cx="540" cy="460" r="4" fill="#FFFFFF"/>

  <!-- Footer -->
  <text id="{{footer}}" x="540" y="1300" font-family="Pretendard, sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.7)" text-anchor="middle" data-max-width="920" data-max-lines="1">
    Web Magazine
  </text>
</svg>
