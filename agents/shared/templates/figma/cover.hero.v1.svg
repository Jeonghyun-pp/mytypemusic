<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- Background -->
  <rect width="1080" height="1350" fill="#1A1A2E"/>

  <!-- Hero image placeholder -->
  <image id="{{hero-image}}" href="" x="0" y="0" width="1080" height="900" preserveAspectRatio="xMidYMid slice"/>

  <!-- Gradient scrim over image -->
  <defs>
    <linearGradient id="scrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A1A2E" stop-opacity="0"/>
      <stop offset="0.6" stop-color="#1A1A2E" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#1A1A2E" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1080" height="900" fill="url(#scrim)"/>

  <!-- Accent bar -->
  <rect id="{{accent-color}}" x="80" y="940" width="60" height="6" rx="3" fill="#6C5CE7"/>

  <!-- Title text -->
  <text id="{{title}}" x="80" y="1010" font-family="Pretendard, sans-serif" font-size="64" font-weight="800" fill="#FFFFFF" data-max-width="920" data-max-lines="2" data-line-height="1.3">
    제목을 입력하세요
  </text>

  <!-- Body text -->
  <text id="{{body}}" x="80" y="1130" font-family="Pretendard, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.75)" data-max-width="920" data-max-lines="3" data-line-height="1.5">
    본문 내용이 여기에 들어갑니다
  </text>

  <!-- Footer text -->
  <text id="{{footer}}" x="540" y="1300" font-family="Pretendard, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.5)" text-anchor="middle" data-max-width="920" data-max-lines="1">
    Web Magazine
  </text>
</svg>
