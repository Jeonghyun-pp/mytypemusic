<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2D3436"/>
      <stop offset="1" stop-color="#636E72"/>
    </linearGradient>
    <radialGradient id="stat-glow" cx="0.5" cy="0.42" r="0.3">
      <stop offset="0" stop-color="#E17055" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#E17055" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg-grad)"/>

  <!-- Glow effect behind stat number -->
  <rect width="1080" height="1350" fill="url(#stat-glow)"/>

  <!-- Title = stat number (large, accent color, centered) -->
  <text id="{{title}}" x="540" y="620" font-family="Pretendard, sans-serif" font-size="96" font-weight="900" fill="#E17055" text-anchor="middle" data-max-width="920" data-max-lines="1" data-line-height="1.0">
    42%
  </text>

  <!-- Accent underline -->
  <rect id="{{accent-color}}" x="490" y="650" width="100" height="3" rx="1.5" fill="#E17055"/>

  <!-- Body (description, centered) -->
  <text id="{{body}}" x="540" y="720" font-family="Pretendard, sans-serif" font-size="24" font-weight="400" fill="rgba(255,255,255,0.75)" text-anchor="middle" data-max-width="920" data-max-lines="4" data-line-height="1.5">
    설명 텍스트가 여기에 들어갑니다
  </text>

  <!-- Footer -->
  <text id="{{footer}}" x="540" y="1300" font-family="Pretendard, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.5)" text-anchor="middle" data-max-width="920" data-max-lines="1">
    Web Magazine
  </text>
</svg>
