<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg-grad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#1a0a2e"/>
      <stop offset="0.4" stop-color="#2d1b4e"/>
      <stop offset="1" stop-color="#4a2068"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0" stop-color="#A29BFE" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#A29BFE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg-grad)"/>
  <rect width="1080" height="1080" fill="url(#center-glow)"/>

  <!-- Decorative quotation mark -->
  <text x="540" y="340" font-family="Pretendard, sans-serif" font-size="100" font-weight="800" fill="rgba(162,155,254,0.25)" text-anchor="middle">
    "
  </text>

  <!-- Body (quote text, centered) -->
  <text id="{{body}}" x="540" y="440" font-family="Pretendard, sans-serif" font-size="32" font-weight="600" fill="#FFFFFF" text-anchor="middle" data-max-width="920" data-max-lines="5" data-line-height="1.6">
    인용문이 여기에 들어갑니다
  </text>

  <!-- Accent divider -->
  <rect id="{{accent-color}}" x="500" y="760" width="80" height="2" rx="1" fill="rgba(162,155,254,0.5)"/>

  <!-- Title (attribution) -->
  <text id="{{title}}" x="540" y="800" font-family="Pretendard, sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.4)" text-anchor="middle" data-max-width="920" data-max-lines="1" data-line-height="1.3">
    출처
  </text>

  <!-- Footer (watermark) -->
  <text id="{{footer}}" x="540" y="1040" font-family="Pretendard, sans-serif" font-size="12" font-weight="400" fill="rgba(255,255,255,0.4)" text-anchor="middle" data-max-width="920" data-max-lines="1">
    Web Magazine
  </text>
</svg>
