<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg-grad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#0b2027"/>
      <stop offset="0.4" stop-color="#0a3d42"/>
      <stop offset="1" stop-color="#1b6b5a"/>
    </linearGradient>
    <linearGradient id="bar-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>
  </defs>

  <!-- Gradient background -->
  <rect width="1080" height="1350" fill="url(#bg-grad)"/>

  <!-- Ghost slide number -->
  <text x="60" y="240" font-family="Pretendard, sans-serif" font-size="120" font-weight="800" fill="rgba(255,255,255,0.06)" letter-spacing="-4">
    01
  </text>

  <!-- Left vertical accent bar -->
  <rect id="{{accent-color}}" x="60" y="140" width="4" height="800" rx="2" fill="url(#bar-grad)"/>

  <!-- Headline (small, muted) -->
  <text id="{{title}}" x="100" y="180" font-family="Pretendard, sans-serif" font-size="32" font-weight="600" fill="rgba(255,255,255,0.55)" data-max-width="880" data-max-lines="1" data-line-height="1.3">
    헤드라인
  </text>

  <!-- Body text (large, bold) -->
  <text id="{{body}}" x="100" y="340" font-family="Pretendard, sans-serif" font-size="44" font-weight="700" fill="#FFFFFF" data-max-width="880" data-max-lines="8" data-line-height="1.4">
    본문 내용이 여기에 들어갑니다
  </text>

  <!-- Footer -->
  <text id="{{footer}}" x="100" y="1300" font-family="Pretendard, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.7)" data-max-width="880" data-max-lines="1">
    Web Magazine
  </text>
</svg>
