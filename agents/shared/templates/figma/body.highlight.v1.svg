<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg-grad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#1A1A2E"/>
      <stop offset="1" stop-color="#2D1B69"/>
    </linearGradient>
    <filter id="bar-shadow" x="-50%" y="-10%" width="200%" height="120%">
      <feDropShadow dx="4" dy="0" stdDeviation="8" flood-color="#E17055" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg-grad)"/>

  <!-- Small label (accent color, uppercase) -->
  <text id="{{title}}" x="80" y="150" font-family="Pretendard, sans-serif" font-size="14" font-weight="700" fill="#E17055" letter-spacing="2" data-max-width="920" data-max-lines="1" data-line-height="1.3">
    HIGHLIGHT
  </text>

  <!-- Accent vertical bar with glow -->
  <rect id="{{accent-color}}" x="70" y="210" width="6" height="400" rx="3" fill="#E17055" filter="url(#bar-shadow)"/>

  <!-- Body text (large, bold, emphasis) -->
  <text id="{{body}}" x="100" y="270" font-family="Pretendard, sans-serif" font-size="40" font-weight="700" fill="#FFFFFF" data-max-width="880" data-max-lines="8" data-line-height="1.45">
    핵심 메시지가 여기에 들어갑니다
  </text>

  <!-- Footer -->
  <text id="{{footer}}" x="80" y="1300" font-family="Pretendard, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.5)" data-max-width="920" data-max-lines="1">
    Web Magazine
  </text>
</svg>
