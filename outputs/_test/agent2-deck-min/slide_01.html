<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<style>
:root {
  --title-size: 72px;
  --subtitle-size: 30px;
  --footer-size: 18px;
  --title-top: 400px;
  --subtitle-top: 716px;
  --footer-bottom: 52px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
}
.canvas {
  position: relative;
  width: 1080px;
  height: 1350px;
  background: #000;
  font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  color: #fff;
}

/* ---- Hero image ---- */
.hero-img {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  filter: brightness(0.62);
  display: block;
}

/* ---- Bottom scrim for footer readability ---- */
.scrim {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 220px;
  background: linear-gradient(to top, rgba(0,0,0,0.65), transparent);
  pointer-events: none;
}

/* ---- Title ---- */
.slot-title {
  position: absolute;
  left: 60px;
  top: var(--title-top);
  width: 960px;
  height: 300px;
  font-size: var(--title-size);
  font-weight: 700;
  line-height: 1.18;
  text-shadow: 0 2px 12px rgba(0,0,0,0.55);
  overflow: hidden;
}

/* ---- Subtitle (optional) ---- */
.slot-subtitle {
  position: absolute;
  left: 60px;
  top: var(--subtitle-top);
  width: 960px;
  height: 80px;
  font-size: var(--subtitle-size);
  font-weight: 500;
  line-height: 1.35;
  color: rgba(255,255,255,0.85);
  text-shadow: 0 1px 6px rgba(0,0,0,0.4);
  overflow: hidden;
}

/* ---- Footer credits ---- */
.slot-footer {
  position: absolute;
  left: 60px;
  bottom: var(--footer-bottom);
  width: 960px;
  height: 40px;
  font-size: var(--footer-size);
  color: rgba(255,255,255,0.7);
  line-height: 40px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
</style>
</head>
<body>
<div id="canvas" class="canvas" data-safe-top="80" data-safe-bottom="120" data-safe-left="60" data-safe-right="60" data-footer-zone-h="220">
  <img class="hero-img" src="file:///C:/Users/pjhic/Projects/Web_magazine/agents/cardnews-composition/fixtures/dummy.jpg" alt="Minimal Topic" />
  <div class="scrim"></div>
  <div id="box-title" class="slot-title" data-bbox-w="960" data-bbox-h="300">Minimal Topic</div>

  <div id="box-footer" class="slot-footer">Photo by Fixture on Unsplash</div>
</div>
</body>
</html>
