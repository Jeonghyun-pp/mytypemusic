<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<style>
:root {
  --cta-size: 52px;
  --footer-size: 22px;
  --footer-bottom: 60px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
}
.canvas {
  display: flex; flex-direction: column;
  position: relative;
  width: 1080px;
  height: 1350px;
  background: linear-gradient(160deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
  font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  color: #fff;
}
.slot-cta {
  position: absolute;
  left: 75px;
  top: 450px;
  width: 930px;
  height: 400px;
  font-size: var(--cta-size);
  font-weight: 700;
  line-height: 1.4;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  overflow: hidden;
}
.slot-footer {
  position: absolute;
  left: 75px;
  bottom: var(--footer-bottom);
  width: 930px;
  height: 40px;
  font-size: var(--footer-size);
  color: rgba(255,255,255,0.7);
  line-height: 40px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex; flex-direction: column;
}

/* --- Style Overrides --- */
.canvas { background: #F5EDE3 !important; }
.canvas { color: #3D3529 !important; }
.slot-footer { color: rgba(61,53,41,0.5) !important; }
.slot-headline { color: rgba(61,53,41,0.55) !important; }
.canvas { font-family: "Noto Serif KR", "Pretendard", serif !important; }
.slot-title { font-family: "Noto Serif KR", "Noto Serif KR", "Pretendard", serif !important; }
.slot-body { font-family: "Pretendard", sans-serif !important; }
.slot-headline { font-family: "Pretendard", sans-serif !important; }
</style>
</head>
<body>
<div id="canvas" class="canvas" data-safe-top="75" data-safe-bottom="100" data-safe-left="75" data-safe-right="75" data-footer-zone-h="220">

  <div id="box-cta" class="slot-cta" data-bbox-w="930" data-bbox-h="400">저장해두고 실천하기 · 팔로우하고 영감 받기</div>
  <div id="box-footer" class="slot-footer">Photo by Test on Unsplash</div>
</div>
</body>
</html>
